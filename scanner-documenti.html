<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>DocScan Pro</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap');
:root{--bg:#0c0c12;--sur:#14141e;--s2:#1d1d2b;--brd:#2e2e42;--acc:#5b8dee;--grn:#3dd68c;--red:#f06292;--txt:#eeeef8;--dim:#7777a0;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--txt);padding-bottom:env(safe-area-inset-bottom,24px);overflow-x:hidden;}
/* HEADER */
.hdr{display:flex;align-items:center;justify-content:space-between;padding:16px 16px 10px;position:sticky;top:0;z-index:60;background:linear-gradient(180deg,var(--bg) 70%,transparent);backdrop-filter:blur(10px);}
.logo{font-family:'Syne',sans-serif;font-weight:800;font-size:1.3rem;letter-spacing:-.5px;}
.logo em{color:var(--acc);font-style:normal;}
.badge{background:var(--s2);border:1px solid var(--brd);border-radius:20px;padding:5px 13px;font-size:.78rem;color:var(--dim);}
.badge b{color:var(--acc);}
/* MAIN */
.wrap{padding:0 12px;}
/* CARD */
.card{background:var(--sur);border:1px solid var(--brd);border-radius:18px;overflow:hidden;margin-bottom:12px;}
.chdr{padding:11px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--brd);}
.lbl{font-family:'Syne',sans-serif;font-size:.68rem;font-weight:700;letter-spacing:1.6px;text-transform:uppercase;color:var(--dim);}
.live{display:flex;align-items:center;gap:6px;font-size:.72rem;color:var(--grn);}
.dot{width:7px;height:7px;border-radius:50%;background:var(--grn);box-shadow:0 0 6px var(--grn);animation:p 2s infinite;}
@keyframes p{0%,100%{opacity:1}50%{opacity:.3}}
/* VIEWPORT — 3:4 portrait */
.vp{position:relative;width:100%;aspect-ratio:3/4;background:#000;overflow:hidden;}
#vid{width:100%;height:100%;object-fit:cover;display:block;transform-origin:center;}
#ov{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;}
.ph{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;background:radial-gradient(ellipse at center,#1a1030 0%,#060610 100%);}
.ph-ic{font-size:3rem;opacity:.5;}
.ph p{color:var(--dim);font-size:.9rem;text-align:center;line-height:1.5;}
/* STATUS BADGE su viewport */
.vstatus{position:absolute;top:10px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.65);border:1px solid rgba(255,255,255,.12);border-radius:20px;padding:5px 14px;font-size:.72rem;color:#fff;backdrop-filter:blur(6px);white-space:nowrap;transition:all .3s;}
.vstatus.found{border-color:var(--grn);color:var(--grn);}
/* BUTTONS */
.btnrow{padding:12px;display:flex;gap:10px;}
.bcap{flex:1;height:52px;background:var(--acc);border:none;border-radius:13px;color:#fff;font-family:'Syne',sans-serif;font-weight:700;font-size:.88rem;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;box-shadow:0 4px 16px rgba(91,141,238,.4);transition:transform .12s,opacity .12s;-webkit-user-select:none;}
.bcap:active{transform:scale(.95);opacity:.85;}
.bsq{width:52px;height:52px;background:var(--s2);border:1px solid var(--brd);border-radius:13px;color:var(--dim);font-size:1.2rem;cursor:pointer;display:flex;align-items:center;justify-content:center;-webkit-user-select:none;}
.bsq:active{opacity:.7;}
.bup{width:100%;height:44px;background:transparent;border:1px dashed var(--brd);border-radius:11px;color:var(--dim);font-size:.86rem;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;}
.bup:active{border-color:var(--acc);color:var(--acc);}
#fin{display:none;}
/* GRID */
.ghdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.bclr{background:transparent;border:1px solid var(--brd);border-radius:8px;padding:5px 10px;color:var(--red);font-size:.73rem;cursor:pointer;}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:12px;}
.th{position:relative;border-radius:10px;overflow:hidden;background:var(--s2);border:2px solid transparent;aspect-ratio:3/4;cursor:pointer;}
.th img{width:100%;height:100%;object-fit:cover;display:block;}
.thov{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(0,0,0,.75));padding:16px 6px 5px;display:flex;align-items:center;justify-content:space-between;}
.pn{font-size:.6rem;font-weight:700;color:#fff;font-family:'Syne',sans-serif;}
.bdel{width:20px;height:20px;background:rgba(240,98,146,.9);border:none;border-radius:5px;color:#fff;font-size:.7rem;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.emp{grid-column:1/-1;padding:32px 16px;text-align:center;color:var(--dim);font-size:.86rem;line-height:1.7;}
/* EXPORT */
.ecard{background:var(--sur);border:1px solid var(--brd);border-radius:18px;padding:14px;margin-bottom:28px;}
.modes{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin:11px 0 13px;}
.mo{background:var(--s2);border:2px solid var(--brd);border-radius:12px;padding:10px 4px;cursor:pointer;text-align:center;-webkit-user-select:none;}
.mo.on{background:rgba(91,141,238,.13);border-color:var(--acc);}
.mo-ic{font-size:1.2rem;margin-bottom:2px;}
.mo-lb{font-size:.66rem;font-weight:700;font-family:'Syne',sans-serif;text-transform:uppercase;letter-spacing:.5px;color:var(--dim);}
.mo.on .mo-lb{color:var(--acc);}
.bexp{width:100%;height:52px;background:linear-gradient(135deg,var(--acc),#9b59d0);border:none;border-radius:13px;color:#fff;font-family:'Syne',sans-serif;font-weight:700;font-size:.92rem;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:9px;box-shadow:0 4px 20px rgba(91,141,238,.45);}
.bexp:disabled{opacity:.3;cursor:not-allowed;box-shadow:none;}
.bexp:not(:disabled):active{opacity:.85;}
.pgw{margin-top:10px;background:var(--s2);border-radius:5px;height:3px;overflow:hidden;display:none;}
.pgf{height:100%;background:linear-gradient(90deg,var(--acc),var(--grn));width:0;transition:width .25s;}
/* MODAL */
.modal{position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:200;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .22s;}
.modal.on{opacity:1;pointer-events:all;}
.mbox{background:var(--sur);border:1px solid var(--brd);border-radius:20px 20px 0 0;width:100%;max-width:480px;max-height:92vh;overflow:hidden;transform:translateY(40px);transition:transform .28s ease;display:flex;flex-direction:column;}
.modal.on .mbox{transform:translateY(0);}
.mhdl{width:36px;height:4px;background:var(--brd);border-radius:2px;margin:10px auto;}
.mhdr{padding:8px 14px 12px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--brd);flex-shrink:0;}
.mtitle{font-family:'Syne',sans-serif;font-weight:700;font-size:.9rem;}
.bclose{background:var(--red);border:none;border-radius:10px;color:#fff;font-family:'Syne',sans-serif;font-size:.8rem;font-weight:700;padding:0 14px;height:36px;cursor:pointer;display:flex;align-items:center;gap:5px;-webkit-user-select:none;}
.bclose:active{opacity:.8;}
.mimgw{flex:1;overflow-y:auto;padding:12px 14px;-webkit-overflow-scrolling:touch;}
#mimg{width:100%;border-radius:10px;display:block;}
.macts{display:flex;gap:9px;padding:10px 14px 16px;flex-shrink:0;border-top:1px solid var(--brd);}
.bma{flex:1;height:46px;background:var(--s2);border:1px solid var(--brd);border-radius:11px;color:var(--txt);font-size:.86rem;cursor:pointer;}
.bma.danger{background:var(--red);border-color:var(--red);color:#fff;font-weight:600;}
.bma:active{opacity:.75;}
/* TOAST */
.toast{position:fixed;bottom:calc(16px + env(safe-area-inset-bottom,0px));left:50%;transform:translateX(-50%) translateY(60px);background:var(--s2);border:1px solid var(--brd);border-radius:10px;padding:10px 18px;font-size:.82rem;white-space:nowrap;z-index:300;transition:transform .28s;pointer-events:none;}
.toast.on{transform:translateX(-50%) translateY(0);}
.toast.ok{border-color:var(--grn);color:var(--grn);}
.toast.er{border-color:var(--red);color:var(--red);}
.flash{position:fixed;inset:0;background:#fff;z-index:500;opacity:0;pointer-events:none;transition:opacity .07s;}
#cc{display:none;}
</style>
</head>
<body>
<div class="flash" id="fl"></div>
<div class="hdr">
  <div class="logo">Doc<em>Scan</em> Pro</div>
  <div class="badge"><b id="cnt">0</b> pagine</div>
</div>
<div class="wrap">

<!-- FOTOCAMERA -->
<div class="card">
  <div class="chdr">
    <span class="lbl">Fotocamera</span>
    <div class="live" id="liveind" style="display:none"><div class="dot"></div>LIVE</div>
  </div>
  <div class="vp" id="vp">
    <div class="ph" id="ph"><div class="ph-ic">📷</div><p>Tocca Avvia<br>per iniziare</p></div>
    <video id="vid" autoplay playsinline muted style="display:none"></video>
    <canvas id="ov"></canvas>
    <div class="vstatus" id="vstatus" style="display:none">Cerco pagina…</div>
  </div>
  <div class="btnrow">
    <button class="bcap" id="mbtn" onclick="startCam()">📷 Avvia Fotocamera</button>
    <button class="bsq" id="fbtn" onclick="flipCam()" style="display:none">🔄</button>
  </div>
</div>
<div style="padding:0 0 12px">
  <button class="bup" onclick="document.getElementById('fin').click()">📁 Importa da Galleria</button>
  <input type="file" id="fin" accept="image/*" multiple onchange="onFiles(event)">
</div>

<!-- PAGINE -->
<div class="ghdr">
  <span class="lbl">Pagine (<span id="cnts">0</span>)</span>
  <button class="bclr" onclick="clearAll()">Svuota tutto</button>
</div>
<div class="grid" id="grid">
  <div class="emp">📄<br><br>Scatta o importa foto<br>per creare il documento</div>
</div>

<!-- EXPORT -->
<div class="ecard">
  <span class="lbl">Modalità PDF</span>
  <div class="modes">
    <div class="mo on" onclick="setMode('color',this)"><div class="mo-ic">🎨</div><div class="mo-lb">Colore</div></div>
    <div class="mo" onclick="setMode('original',this)"><div class="mo-ic">📸</div><div class="mo-lb">Originale</div></div>
    <div class="mo" onclick="setMode('bw',this)"><div class="mo-ic">⬛</div><div class="mo-lb">B&amp;N</div></div>
  </div>
  <button class="bexp" id="bexp" onclick="exportPDF()" disabled>📤 Esporta PDF</button>
  <div class="pgw" id="pgw"><div class="pgf" id="pgf"></div></div>
</div>

</div><!-- /wrap -->

<!-- MODAL -->
<div class="modal" id="modal" onclick="bgClose(event)">
  <div class="mbox">
    <div class="mhdl"></div>
    <div class="mhdr">
      <span class="mtitle" id="mtitle">Pagina</span>
      <button class="bclose" onclick="closeModal()">✕ Chiudi</button>
    </div>
    <div class="mimgw"><img id="mimg" src="" alt=""></div>
    <div class="macts">
      <button class="bma" onclick="closeModal()">← Indietro</button>
      <button class="bma danger" onclick="delCur()">🗑 Elimina</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>
<canvas id="cc"></canvas>

<script>
const {jsPDF}=window.jspdf;

// ── STATE ──
let stream=null, facing='environment';
let pages=[], mode='color', selIdx=-1;
let edgeTmr=null;

// Smoothing buffer
const BUFN=6;
let cbuf=[];
let lastGood=null; // ultimi corners validi, per non perdere il frame

const vid=document.getElementById('vid');
const ovC=document.getElementById('ov');
const ccC=document.getElementById('cc');
const octx=ovC.getContext('2d');

// ── CAMERA ─────────────────────────────────────────────────────────────────
async function startCam(){
  try{
    if(stream) stream.getTracks().forEach(t=>t.stop());
    stream=await navigator.mediaDevices.getUserMedia({
      video:{facingMode:facing, width:{ideal:1280}, height:{ideal:1920}}
    });
    vid.srcObject=stream; vid.style.display='block';
    document.getElementById('ph').style.display='none';
    document.getElementById('liveind').style.display='flex';
    document.getElementById('fbtn').style.display='flex';
    document.getElementById('vstatus').style.display='block';
    const mb=document.getElementById('mbtn');
    mb.innerHTML='📸 Scatta Foto'; mb.onclick=capturePhoto;
    vid.onloadedmetadata=()=>{syncOv(); cbuf=[]; lastGood=null; startEdge();};
    toast('Fotocamera attiva ✓','ok');
  }catch(e){toast('Errore fotocamera — prova Importa','er'); console.error(e);}
}
async function flipCam(){facing=facing==='environment'?'user':'environment'; await startCam();}
function syncOv(){ovC.width=vid.videoWidth||320; ovC.height=vid.videoHeight||480;}

// ── EDGE LOOP ──────────────────────────────────────────────────────────────
function startEdge(){
  if(edgeTmr)clearInterval(edgeTmr);
  edgeTmr=setInterval(edgeFrame,150);
}

function edgeFrame(){
  if(!vid.videoWidth) return;
  syncOv();
  const W=ovC.width, H=ovC.height;

  // Lavora su immagine ridotta (velocità)
  const SC=4;
  const sw=Math.floor(W/SC), sh=Math.floor(H/SC);
  const tmp=Object.assign(document.createElement('canvas'),{width:sw,height:sh});
  tmp.getContext('2d').drawImage(vid,0,0,sw,sh);
  const id=tmp.getContext('2d').getImageData(0,0,sw,sh);

  const raw=detectDocument(id,sw,sh);
  const corners = raw ? scaleCorners(raw,SC) : null;

  if(corners){
    cbuf.push(corners);
    if(cbuf.length>BUFN) cbuf.shift();
    lastGood=smoothBuf();
  } else {
    if(cbuf.length>0) cbuf.shift();
    if(cbuf.length>0) lastGood=smoothBuf();
    else lastGood=null;
  }

  drawOv(W,H,lastGood);

  // Aggiorna status badge
  const st=document.getElementById('vstatus');
  if(lastGood){st.textContent='✓ Pagina rilevata — scatta!'; st.classList.add('found');}
  else{st.textContent='Cerco pagina…'; st.classList.remove('found');}
}

function scaleCorners(c,sc){
  return {
    tl:{x:c.tl.x*sc,y:c.tl.y*sc}, tr:{x:c.tr.x*sc,y:c.tr.y*sc},
    br:{x:c.br.x*sc,y:c.br.y*sc}, bl:{x:c.bl.x*sc,y:c.bl.y*sc}
  };
}
function smoothBuf(){
  if(!cbuf.length)return null;
  const a={tl:{x:0,y:0},tr:{x:0,y:0},br:{x:0,y:0},bl:{x:0,y:0}};
  for(const c of cbuf) for(const k of['tl','tr','br','bl']){a[k].x+=c[k].x;a[k].y+=c[k].y;}
  const n=cbuf.length;
  for(const k of['tl','tr','br','bl']){a[k].x/=n;a[k].y/=n;}
  return a;
}

function drawOv(W,H,c){
  octx.clearRect(0,0,W,H);
  if(c){
    const {tl,tr,br,bl}=c;
    // Fill semi-trasparente
    octx.beginPath();
    octx.moveTo(tl.x,tl.y);octx.lineTo(tr.x,tr.y);octx.lineTo(br.x,br.y);octx.lineTo(bl.x,bl.y);
    octx.closePath();
    octx.fillStyle='rgba(61,214,140,.07)'; octx.fill();
    // Bordo verde
    octx.strokeStyle='#3dd68c'; octx.lineWidth=Math.max(3,W*.005);
    octx.setLineDash([]); octx.stroke();
    // Cerchietti agli angoli
    for(const pt of[tl,tr,br,bl]){
      octx.beginPath();
      octx.arc(pt.x,pt.y,Math.max(8,W*.018),0,Math.PI*2);
      octx.fillStyle='#3dd68c'; octx.fill();
      octx.strokeStyle='#fff'; octx.lineWidth=2; octx.stroke();
    }
  } else {
    // Guida tratteggiata
    const px=W*.12, py=H*.07;
    octx.strokeStyle='rgba(255,255,255,.18)'; octx.lineWidth=1.5;
    octx.setLineDash([12,8]);
    octx.strokeRect(px,py,W-px*2,H-py*2);
    octx.setLineDash([]);
    // Angolini bianchi
    const cs=24, cw=3;
    octx.strokeStyle='rgba(255,255,255,.5)'; octx.lineWidth=cw; octx.setLineDash([]);
    // TL
    octx.beginPath();octx.moveTo(px,py+cs);octx.lineTo(px,py);octx.lineTo(px+cs,py);octx.stroke();
    // TR
    octx.beginPath();octx.moveTo(W-px-cs,py);octx.lineTo(W-px,py);octx.lineTo(W-px,py+cs);octx.stroke();
    // BR
    octx.beginPath();octx.moveTo(W-px,H-py-cs);octx.lineTo(W-px,H-py);octx.lineTo(W-px-cs,H-py);octx.stroke();
    // BL
    octx.beginPath();octx.moveTo(px+cs,H-py);octx.lineTo(px,H-py);octx.lineTo(px,H-py-cs);octx.stroke();
  }
}

// ── ALGORITMO RILEVAMENTO DOCUMENTO ────────────────────────────────────────
// Approccio: Canny-like → Hough Lines semplificato → trova 4 linee dominanti
// (2 orizzontali + 2 verticali) → calcola 4 intersezioni
function detectDocument(imgData, W, H){
  const px=imgData.data;

  // 1. Grayscale
  const g=new Uint8Array(W*H);
  for(let i=0;i<W*H;i++) g[i]=(px[i*4]*.299+px[i*4+1]*.587+px[i*4+2]*.114)|0;

  // 2. Gaussian blur 5x5
  const b=gaussBlur(g,W,H);

  // 3. Sobel → magnitude + angle
  const {mag,ang}=sobel(b,W,H);

  // 4. Non-maximum suppression
  const nms=nonMaxSupp(mag,ang,W,H);

  // 5. Double threshold
  const maxMag=Math.max(...nms);
  if(maxMag<15) return null;
  const hi=maxMag*.25, lo=maxMag*.08;
  const edges=new Uint8Array(W*H);
  for(let i=0;i<W*H;i++) edges[i]=nms[i]>=hi?2:(nms[i]>=lo?1:0);
  hysteresis(edges,W,H);

  // 6. Hough Lines (rho-theta)
  const lines=houghLines(edges,W,H);
  if(lines.length<4) return null;

  // 7. Raggruppa in linee orizzontali e verticali
  const horiz=[], vert=[];
  for(const l of lines){
    const deg=l.theta*(180/Math.PI);
    if(deg<30||deg>150) vert.push(l);   // vicino a 0° o 180° = verticali
    else horiz.push(l);                  // vicino a 90° = orizzontali
  }
  if(horiz.length<2||vert.length<2) return null;

  // Prendi le 2 migliori per ciascun gruppo (più distanti tra loro)
  const h2=pickTwo(horiz,'rho');
  const v2=pickTwo(vert,'rho');
  if(!h2||!v2) return null;

  // 8. Calcola le 4 intersezioni
  const tl=intersect(h2[0],v2[0]);
  const tr=intersect(h2[0],v2[1]);
  const bl=intersect(h2[1],v2[0]);
  const br=intersect(h2[1],v2[1]);

  if(!tl||!tr||!bl||!br) return null;

  // Metti in ordine corretto (TL=min x+y, TR=max x-y, ecc.)
  const pts=[tl,tr,bl,br];
  pts.sort((a,b)=>(a.x+a.y)-(b.x+b.y));
  const ptTL=pts[0];
  pts.sort((a,b)=>(b.x+b.y)-(a.x+a.y));
  const ptBR=pts[0];
  pts.sort((a,b)=>(a.x-a.y)-(b.x-b.y));
  const ptBL=pts[0];
  pts.sort((a,b)=>(b.x-b.y)-(a.x-a.y));
  const ptTR=pts[0];

  // Validazione: dimensioni minime (>20% della viewport)
  const dw=Math.hypot(ptTR.x-ptTL.x,ptTR.y-ptTL.y);
  const dh=Math.hypot(ptBL.x-ptTL.x,ptBL.y-ptTL.y);
  if(dw<W*.2||dh<H*.2) return null;

  // Tutti i punti devono essere dentro l'immagine (con margine)
  const mg=-W*.1;
  for(const p of[ptTL,ptTR,ptBR,ptBL]){
    if(p.x<mg||p.x>W-mg||p.y<mg||p.y>H-mg) return null;
  }

  return {tl:ptTL,tr:ptTR,br:ptBR,bl:ptBL};
}

// Gaussian blur 5x5
function gaussBlur(g,W,H){
  const k=[1,4,6,4,1,4,16,24,16,4,6,24,36,24,6,4,16,24,16,4,1,4,6,4,1];
  const ks=256;
  const out=new Uint8Array(W*H);
  for(let y=2;y<H-2;y++) for(let x=2;x<W-2;x++){
    let s=0;
    for(let ky=0;ky<5;ky++) for(let kx=0;kx<5;kx++)
      s+=g[(y+ky-2)*W+(x+kx-2)]*k[ky*5+kx];
    out[y*W+x]=(s/ks)|0;
  }
  return out;
}

// Sobel
function sobel(g,W,H){
  const mag=new Float32Array(W*H);
  const ang=new Float32Array(W*H);
  for(let y=1;y<H-1;y++) for(let x=1;x<W-1;x++){
    const gx=-g[(y-1)*W+(x-1)]+g[(y-1)*W+(x+1)]-2*g[y*W+(x-1)]+2*g[y*W+(x+1)]-g[(y+1)*W+(x-1)]+g[(y+1)*W+(x+1)];
    const gy=-g[(y-1)*W+(x-1)]-2*g[(y-1)*W+x]-g[(y-1)*W+(x+1)]+g[(y+1)*W+(x-1)]+2*g[(y+1)*W+x]+g[(y+1)*W+(x+1)];
    mag[y*W+x]=Math.sqrt(gx*gx+gy*gy);
    ang[y*W+x]=Math.atan2(gy,gx);
  }
  return{mag,ang};
}

// Non-maximum suppression
function nonMaxSupp(mag,ang,W,H){
  const out=new Float32Array(W*H);
  for(let y=1;y<H-1;y++) for(let x=1;x<W-1;x++){
    const a=ang[y*W+x];
    const deg=((a*180/Math.PI)%180+180)%180;
    let p,q;
    if(deg<22.5||deg>=157.5){p=mag[y*W+(x-1)];q=mag[y*W+(x+1)];}
    else if(deg<67.5){p=mag[(y-1)*W+(x+1)];q=mag[(y+1)*W+(x-1)];}
    else if(deg<112.5){p=mag[(y-1)*W+x];q=mag[(y+1)*W+x];}
    else{p=mag[(y-1)*W+(x-1)];q=mag[(y+1)*W+(x+1)];}
    const m=mag[y*W+x];
    out[y*W+x]=(m>=p&&m>=q)?m:0;
  }
  return out;
}

// Hysteresis
function hysteresis(e,W,H){
  const dx=[1,-1,0,0,1,-1,1,-1];
  const dy=[0,0,1,-1,1,-1,-1,1];
  const stack=[];
  for(let i=0;i<W*H;i++) if(e[i]===2) stack.push(i);
  while(stack.length){
    const i=stack.pop();
    const x=i%W,y=(i/W)|0;
    for(let d=0;d<8;d++){
      const nx=x+dx[d],ny=y+dy[d];
      if(nx>=0&&nx<W&&ny>=0&&ny<H){
        const ni=ny*W+nx;
        if(e[ni]===1){e[ni]=2;stack.push(ni);}
      }
    }
  }
  for(let i=0;i<W*H;i++) if(e[i]!==2) e[i]=0;
}

// Hough Transform semplificata
function houghLines(edges,W,H){
  const THETA_STEPS=180;
  const maxRho=Math.ceil(Math.sqrt(W*W+H*H));
  const acc=new Int32Array(THETA_STEPS*maxRho*2);

  const cosT=new Float32Array(THETA_STEPS);
  const sinT=new Float32Array(THETA_STEPS);
  for(let t=0;t<THETA_STEPS;t++){
    const th=t*Math.PI/THETA_STEPS;
    cosT[t]=Math.cos(th); sinT[t]=Math.sin(th);
  }

  for(let y=0;y<H;y++) for(let x=0;x<W;x++){
    if(!edges[y*W+x]) continue;
    for(let t=0;t<THETA_STEPS;t++){
      const rho=Math.round(x*cosT[t]+y*sinT[t])+maxRho;
      acc[t*maxRho*2+rho]++;
    }
  }

  // Trova picchi
  const THR=Math.max(W,H)*.12|0;
  const peaks=[];
  for(let t=0;t<THETA_STEPS;t++) for(let r=0;r<maxRho*2;r++){
    const v=acc[t*maxRho*2+r];
    if(v<THR) continue;
    // Verifica massimo locale 5x5
    let isMax=true;
    outer:for(let dt=-2;dt<=2;dt++) for(let dr=-2;dr<=2;dr++){
      if(dt===0&&dr===0) continue;
      const nt=((t+dt)%THETA_STEPS+THETA_STEPS)%THETA_STEPS;
      const nr=r+dr;
      if(nr>=0&&nr<maxRho*2&&acc[nt*maxRho*2+nr]>v){isMax=false;break outer;}
    }
    if(isMax) peaks.push({theta:t*Math.PI/THETA_STEPS, rho:r-maxRho, votes:v});
  }

  peaks.sort((a,b)=>b.votes-a.votes);
  // NMS sulle linee: rimuovi linee troppo simili
  const result=[];
  for(const p of peaks){
    let dup=false;
    for(const r of result){
      const dRho=Math.abs(p.rho-r.rho);
      const dTheta=Math.abs(p.theta-r.theta);
      if(dRho<Math.max(W,H)*.08 && dTheta<0.3){dup=true;break;}
    }
    if(!dup) result.push(p);
    if(result.length>=12) break;
  }
  return result;
}

// Scegli le 2 linee più distanti in un gruppo
function pickTwo(lines, key){
  if(lines.length<2) return null;
  lines.sort((a,b)=>a[key]-b[key]);
  // Prendi la più piccola e la più grande di rho
  return [lines[0], lines[lines.length-1]];
}

// Intersezione di due linee in forma (rho, theta)
function intersect(l1,l2){
  const cos1=Math.cos(l1.theta), sin1=Math.sin(l1.theta);
  const cos2=Math.cos(l2.theta), sin2=Math.sin(l2.theta);
  const det=cos1*sin2-sin1*cos2;
  if(Math.abs(det)<1e-6) return null;
  const x=(l1.rho*sin2-l2.rho*sin1)/det;
  const y=(l2.rho*cos1-l1.rho*cos2)/det;
  return{x:Math.round(x),y:Math.round(y)};
}

// ── SCATTO ─────────────────────────────────────────────────────────────────
async function capturePhoto(){
  if(!stream) return;
  const fl=document.getElementById('fl');
  fl.style.opacity=1; setTimeout(()=>fl.style.opacity=0,90);

  const VW=vid.videoWidth, VH=vid.videoHeight;
  ccC.width=VW; ccC.height=VH;
  ccC.getContext('2d').drawImage(vid,0,0,VW,VH);
  const origURL=ccC.toDataURL('image/jpeg',.94);

  let procURL=origURL;
  if(lastGood){
    // Scala corners da overlay a video
    const rx=VW/ovC.width, ry=VH/ovC.height;
    const sc={
      tl:{x:lastGood.tl.x*rx,y:lastGood.tl.y*ry},
      tr:{x:lastGood.tr.x*rx,y:lastGood.tr.y*ry},
      br:{x:lastGood.br.x*rx,y:lastGood.br.y*ry},
      bl:{x:lastGood.bl.x*rx,y:lastGood.bl.y*ry},
    };
    procURL=perspWarp(ccC,sc);
  }

  pages.push({orig:origURL,proc:procURL});
  updateGrid(); updateExp();
  toast(`Pagina ${pages.length} acquisita ✓`,'ok');
}

// ── WARPING PROSPETTICO ────────────────────────────────────────────────────
function perspWarp(srcC,{tl,tr,br,bl}){
  const W=Math.round(Math.max(dist(tl,tr),dist(bl,br)));
  const H=Math.round(Math.max(dist(tl,bl),dist(tr,br)));
  const dst=Object.assign(document.createElement('canvas'),{width:W,height:H});
  const dctx=dst.getContext('2d');
  const src=srcC.getContext('2d').getImageData(0,0,srcC.width,srcC.height);
  const out=dctx.createImageData(W,H);
  const SW=srcC.width, SH=srcC.height;
  for(let dy=0;dy<H;dy++) for(let dx=0;dx<W;dx++){
    const u=dx/W,v=dy/H;
    const sx=(1-u)*(1-v)*tl.x+u*(1-v)*tr.x+u*v*br.x+(1-u)*v*bl.x;
    const sy=(1-u)*(1-v)*tl.y+u*(1-v)*tr.y+u*v*br.y+(1-u)*v*bl.y;
    const ix=Math.round(sx),iy=Math.round(sy);
    if(ix>=0&&ix<SW&&iy>=0&&iy<SH){
      const si=(iy*SW+ix)*4,di=(dy*W+dx)*4;
      out.data[di]=src.data[si];out.data[di+1]=src.data[si+1];
      out.data[di+2]=src.data[si+2];out.data[di+3]=255;
    }
  }
  dctx.putImageData(out,0,0);
  autoLvl(dst);
  return dst.toDataURL('image/jpeg',.94);
}
function dist(a,b){return Math.hypot(b.x-a.x,b.y-a.y);}
function autoLvl(c){
  const cx=c.getContext('2d'),d=cx.getImageData(0,0,c.width,c.height),p=d.data;
  let mn=[255,255,255],mx=[0,0,0];
  for(let i=0;i<p.length;i+=4) for(let ch=0;ch<3;ch++){mn[ch]=Math.min(mn[ch],p[i+ch]);mx[ch]=Math.max(mx[ch],p[i+ch]);}
  for(let i=0;i<p.length;i+=4) for(let ch=0;ch<3;ch++) p[i+ch]=Math.min(255,((p[i+ch]-mn[ch])/((mx[ch]-mn[ch])||1))*255)|0;
  cx.putImageData(d,0,0);
}

// ── FILE UPLOAD ────────────────────────────────────────────────────────────
function onFiles(e){
  const files=Array.from(e.target.files);let done=0;
  files.forEach(f=>{
    const r=new FileReader();
    r.onload=ev=>{pages.push({orig:ev.target.result,proc:ev.target.result});
      if(++done===files.length){updateGrid();updateExp();toast(`${done} pagine aggiunte`,'ok');}};
    r.readAsDataURL(f);
  });
  e.target.value='';
}

// ── GRIGLIA ────────────────────────────────────────────────────────────────
function updateGrid(){
  const g=document.getElementById('grid'),n=pages.length;
  document.getElementById('cnt').textContent=n;
  document.getElementById('cnts').textContent=n;
  if(!n){g.innerHTML='<div class="emp">📄<br><br>Scatta o importa foto<br>per creare il documento</div>';return;}
  g.innerHTML=pages.map((p,i)=>`
    <div class="th" onclick="openModal(${i})">
      <img src="${p.proc}" loading="lazy">
      <div class="thov"><span class="pn">PAG.${i+1}</span>
        <button class="bdel" onclick="event.stopPropagation();delPage(${i})">✕</button>
      </div></div>`).join('');
}
function delPage(i){pages.splice(i,1);updateGrid();updateExp();toast('Pagina eliminata','ok');}
function clearAll(){if(!pages.length)return;if(confirm('Eliminare tutte le pagine?')){pages=[];updateGrid();updateExp();}}
function updateExp(){document.getElementById('bexp').disabled=!pages.length;}

// ── MODAL ──────────────────────────────────────────────────────────────────
function openModal(i){
  selIdx=i;
  document.getElementById('mimg').src=pages[i].proc;
  document.getElementById('mtitle').textContent=`Pagina ${i+1} / ${pages.length}`;
  document.getElementById('modal').classList.add('on');
  document.body.style.overflow='hidden';
}
function closeModal(){document.getElementById('modal').classList.remove('on');document.body.style.overflow='';selIdx=-1;}
function bgClose(e){if(e.target===document.getElementById('modal'))closeModal();}
function delCur(){if(selIdx<0)return;delPage(selIdx);closeModal();}

// ── MODALITÀ ───────────────────────────────────────────────────────────────
function setMode(m,el){mode=m;document.querySelectorAll('.mo').forEach(b=>b.classList.remove('on'));el.classList.add('on');}

// ── PROCESSING ─────────────────────────────────────────────────────────────
function processImg(url,m){
  return new Promise(res=>{
    if(m==='original'){res(url);return;}
    const img=new Image();
    img.onload=()=>{
      const c=Object.assign(document.createElement('canvas'),{width:img.width,height:img.height});
      const cx=c.getContext('2d');cx.drawImage(img,0,0);
      const id=cx.getImageData(0,0,c.width,c.height),p=id.data;
      if(m==='bw'){
        for(let i=0;i<p.length;i+=4){const l=Math.min(255,Math.max(0,(p[i]*.299+p[i+1]*.587+p[i+2]*.114-128)*1.5+128))|0;p[i]=p[i+1]=p[i+2]=l;}
      } else {
        let mn=[255,255,255],mx=[0,0,0];
        for(let i=0;i<p.length;i+=4) for(let ch=0;ch<3;ch++){mn[ch]=Math.min(mn[ch],p[i+ch]);mx[ch]=Math.max(mx[ch],p[i+ch]);}
        for(let i=0;i<p.length;i+=4){
          let r=((p[i]-mn[0])/((mx[0]-mn[0])||1))*255;
          let g=((p[i+1]-mn[1])/((mx[1]-mn[1])||1))*255;
          let b=((p[i+2]-mn[2])/((mx[2]-mn[2])||1))*255;
          const lum=r*.299+g*.587+b*.114;
          p[i]=Math.min(255,Math.max(0,lum+(r-lum)*1.3))|0;
          p[i+1]=Math.min(255,Math.max(0,lum+(g-lum)*1.3))|0;
          p[i+2]=Math.min(255,Math.max(0,lum+(b-lum)*1.3))|0;
        }
      }
      cx.putImageData(id,0,0);res(c.toDataURL('image/jpeg',.94));
    };
    img.src=url;
  });
}

// ── EXPORT PDF ─────────────────────────────────────────────────────────────
async function exportPDF(){
  if(!pages.length)return;
  const btn=document.getElementById('bexp'),pw=document.getElementById('pgw'),pf=document.getElementById('pgf');
  btn.disabled=true;btn.innerHTML='⏳ Generazione...';pw.style.display='block';pf.style.width='0%';
  try{
    const pdf=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
    const PW=210,PH=297;
    for(let i=0;i<pages.length;i++){
      pf.style.width=((i+.5)/pages.length*100)+'%';
      if(i>0)pdf.addPage();
      const imgD=await processImg(pages[i].proc,mode);
      const dim=await new Promise(r=>{const im=new Image();im.onload=()=>r({w:im.width,h:im.height});im.src=imgD;});
      const ratio=dim.w/dim.h,mh=10,mv=12,maxW=PW-mh*2,maxH=PH-mv*2;
      let dw,dh;if(ratio>maxW/maxH){dw=maxW;dh=maxW/ratio;}else{dh=maxH;dw=maxH*ratio;}
      pdf.addImage(imgD,'JPEG',(PW-dw)/2,(PH-dh)/2,dw,dh);
      pdf.setFontSize(8);pdf.setTextColor(160,160,160);
      pdf.text(`${i+1} / ${pages.length}`,PW/2,PH-4,{align:'center'});
      pf.style.width=((i+1)/pages.length*100)+'%';
    }
    pdf.save(`documento_${mode}_${Date.now()}.pdf`);
    toast('PDF esportato ✓','ok');
  }catch(e){console.error(e);toast('Errore esportazione','er');}
  btn.disabled=false;btn.innerHTML='📤 Esporta PDF';
  setTimeout(()=>{pw.style.display='none';pf.style.width='0%';},1200);
}

// ── UTILS ──────────────────────────────────────────────────────────────────
let toastT=null;
function toast(msg,type=''){
  const t=document.getElementById('toast');
  t.textContent=msg;t.className=`toast on ${type}`;
  if(toastT)clearTimeout(toastT);
  toastT=setTimeout(()=>t.classList.remove('on'),2600);
}
window.addEventListener('resize',()=>{if(vid.videoWidth)syncOv();});
document.addEventListener('visibilitychange',()=>{
  if(document.hidden){if(edgeTmr)clearInterval(edgeTmr);}
  else if(stream){syncOv();startEdge();}
});
