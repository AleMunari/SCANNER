<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>DocScan Pro</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap');
:root {
  --bg:#0a0a0f; --surface:#13131a; --s2:#1c1c27; --border:#2a2a3d;
  --acc:#6c63ff; --red:#ff6584; --green:#43e97b;
  --text:#f0f0f8; --dim:#8888aa; --r:16px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow-x:hidden;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);padding-bottom:env(safe-area-inset-bottom,20px);}
.hdr{padding:18px 18px 10px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;background:linear-gradient(to bottom,var(--bg) 75%,transparent);backdrop-filter:blur(12px);}
.logo{font-family:'Syne',sans-serif;font-weight:800;font-size:1.35rem;letter-spacing:-.5px;}
.logo b{color:var(--acc);}
.badge{background:var(--s2);border:1px solid var(--border);border-radius:20px;padding:5px 13px;font-size:.8rem;color:var(--dim);}
.badge span{color:var(--acc);font-weight:700;}
.main{padding:0 14px;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:14px;}
.card-hdr{padding:12px 15px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);}
.lbl{font-family:'Syne',sans-serif;font-size:.7rem;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--dim);}
.dot{width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green);animation:blink 2s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.4}}

/* VIEWPORT VERTICALE — aspect-ratio 3:4 */
.viewport{position:relative;width:100%;aspect-ratio:3/4;background:#000;overflow:hidden;}
#video{width:100%;height:100%;object-fit:cover;display:block;}
#overlay{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;}
.ph{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;background:linear-gradient(135deg,#0d0d1a,#1a0a2e);}
.ph-icon{font-size:2.5rem;opacity:.6;}
.ph p{color:var(--dim);font-size:.9rem;}
.gc{position:absolute;width:22px;height:22px;border-color:rgba(255,255,255,.35);border-style:solid;}
.gc.tl{top:10px;left:10px;border-width:3px 0 0 3px;}
.gc.tr{top:10px;right:10px;border-width:3px 3px 0 0;}
.gc.bl{bottom:10px;left:10px;border-width:0 0 3px 3px;}
.gc.br{bottom:10px;right:10px;border-width:0 3px 3px 0;}
.cap-row{padding:14px;display:flex;gap:10px;align-items:center;}
.btn-cap{flex:1;height:54px;background:var(--acc);border:none;border-radius:13px;color:#fff;font-family:'Syne',sans-serif;font-weight:700;font-size:.9rem;letter-spacing:.4px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;box-shadow:0 4px 18px rgba(108,99,255,.45);transition:transform .15s,opacity .15s;-webkit-user-select:none;}
.btn-cap:active{transform:scale(.96);opacity:.85;}
.btn-sq{width:54px;height:54px;background:var(--s2);border:1px solid var(--border);border-radius:13px;color:var(--dim);font-size:1.3rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform .15s;-webkit-user-select:none;}
.btn-sq:active{transform:scale(.93);}
.upload-wrap{padding:0 14px 14px;}
.btn-up{width:100%;height:46px;background:transparent;border:1px dashed var(--border);border-radius:11px;color:var(--dim);font-family:'DM Sans',sans-serif;font-size:.88rem;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;}
.btn-up:active{border-color:var(--acc);color:var(--acc);}
#fileIn{display:none;}
.sec-hdr{display:flex;align-items:center;justify-content:space-between;padding:0 3px;margin-bottom:11px;}
.btn-clr{background:transparent;border:1px solid var(--border);border-radius:8px;padding:5px 11px;color:var(--red);font-size:.75rem;cursor:pointer;font-family:'DM Sans',sans-serif;}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px;}
.thumb{position:relative;border-radius:10px;overflow:hidden;background:var(--s2);border:2px solid transparent;aspect-ratio:3/4;cursor:pointer;}
.thumb:active{opacity:.8;}
.thumb img{width:100%;height:100%;object-fit:cover;display:block;}
.thumb-ov{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(0,0,0,.8));padding:18px 6px 6px;display:flex;align-items:center;justify-content:space-between;}
.pnum{font-size:.62rem;font-weight:700;color:#fff;font-family:'Syne',sans-serif;}
.btn-del{width:22px;height:22px;background:rgba(255,101,132,.9);border:none;border-radius:6px;color:#fff;font-size:.75rem;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.empty{grid-column:1/-1;padding:36px 20px;text-align:center;color:var(--dim);font-size:.88rem;line-height:1.7;}
.empty-ic{font-size:2.2rem;margin-bottom:8px;opacity:.45;}
.exp-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:15px;margin-bottom:28px;}
.modes{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:12px 0 14px;}
.mode{background:var(--s2);border:2px solid var(--border);border-radius:12px;padding:11px 5px;cursor:pointer;text-align:center;transition:border-color .2s,background .2s;-webkit-user-select:none;}
.mode.on{background:rgba(108,99,255,.14);border-color:var(--acc);}
.mode-ic{font-size:1.25rem;margin-bottom:3px;}
.mode-lb{font-size:.68rem;font-weight:700;font-family:'Syne',sans-serif;text-transform:uppercase;letter-spacing:.5px;color:var(--dim);}
.mode.on .mode-lb{color:var(--acc);}
.btn-exp{width:100%;height:54px;background:linear-gradient(135deg,var(--acc),#a855f7);border:none;border-radius:13px;color:#fff;font-family:'Syne',sans-serif;font-weight:700;font-size:.95rem;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;box-shadow:0 4px 22px rgba(108,99,255,.5);transition:transform .15s;-webkit-user-select:none;}
.btn-exp:disabled{opacity:.35;cursor:not-allowed;box-shadow:none;}
.btn-exp:not(:disabled):active{transform:scale(.98);}
.prog-wrap{margin-top:11px;background:var(--s2);border-radius:6px;height:4px;overflow:hidden;display:none;}
.prog{height:100%;background:linear-gradient(90deg,var(--acc),var(--green));border-radius:6px;width:0;transition:width .3s;}

/* MODAL — slide up dal basso, chiusura facile */
.modal{position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:200;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .25s;}
.modal.on{opacity:1;pointer-events:all;}
.modal-box{background:var(--surface);border:1px solid var(--border);border-radius:22px 22px 0 0;width:100%;max-width:500px;max-height:90vh;overflow:hidden;transform:translateY(50px);transition:transform .3s ease;display:flex;flex-direction:column;}
.modal.on .modal-box{transform:translateY(0);}
/* Handle di trascinamento visivo */
.drag-handle{width:40px;height:4px;background:var(--border);border-radius:2px;margin:12px auto 0;flex-shrink:0;}
.modal-hdr{padding:10px 16px 12px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);flex-shrink:0;}
.modal-title{font-family:'Syne',sans-serif;font-weight:700;font-size:.95rem;}
/* PULSANTE CHIUDI — molto visibile, rosso, grande */
.btn-close{min-width:80px;height:38px;background:var(--red);border:none;border-radius:10px;color:#fff;font-size:.85rem;font-weight:700;font-family:'Syne',sans-serif;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px;padding:0 12px;-webkit-user-select:none;}
.btn-close:active{opacity:.8;}
.modal-img-wrap{flex:1;overflow-y:auto;padding:14px 16px;-webkit-overflow-scrolling:touch;}
#mImg{width:100%;border-radius:12px;display:block;}
.modal-acts{display:flex;gap:10px;padding:12px 16px 20px;flex-shrink:0;border-top:1px solid var(--border);}
.btn-ma{flex:1;height:48px;background:var(--s2);border:1px solid var(--border);border-radius:11px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:.88rem;cursor:pointer;}
.btn-ma.danger{background:var(--red);border-color:var(--red);color:#fff;font-weight:600;}
.btn-ma:active{opacity:.8;}

.toast{position:fixed;bottom:calc(18px + env(safe-area-inset-bottom,0px));left:50%;transform:translateX(-50%) translateY(70px);background:var(--s2);border:1px solid var(--border);border-radius:11px;padding:11px 20px;font-size:.84rem;white-space:nowrap;z-index:300;transition:transform .3s;pointer-events:none;}
.toast.show{transform:translateX(-50%) translateY(0);}
.toast.ok{border-color:var(--green);color:var(--green);}
.toast.err{border-color:var(--red);color:var(--red);}
.flash{position:fixed;inset:0;background:#fff;z-index:400;opacity:0;pointer-events:none;transition:opacity .08s;}
#capCanvas{display:none;}
</style>
</head>
<body>

<div class="flash" id="flash"></div>

<div class="hdr">
  <div class="logo">Doc<b>Scan</b> Pro</div>
  <div class="badge"><span id="cnt">0</span> pagine</div>
</div>

<div class="main">

  <div class="card">
    <div class="card-hdr">
      <span class="lbl">Fotocamera</span>
      <div class="dot" id="liveDot" style="display:none"></div>
    </div>
    <!-- VIEWPORT 3:4 = VERTICALE come una pagina -->
    <div class="viewport" id="vp">
      <div class="ph" id="ph">
        <div class="ph-icon">📷</div>
        <p>Tocca per avviare la fotocamera</p>
      </div>
      <video id="video" autoplay playsinline muted style="display:none"></video>
      <canvas id="overlay"></canvas>
      <div class="gc tl" id="gTL" style="display:none"></div>
      <div class="gc tr" id="gTR" style="display:none"></div>
      <div class="gc bl" id="gBL" style="display:none"></div>
      <div class="gc br" id="gBR" style="display:none"></div>
    </div>
    <div class="cap-row">
      <button class="btn-cap" id="mainBtn" onclick="startCamera()">📷 Avvia Fotocamera</button>
      <button class="btn-sq" id="flipBtn" onclick="flipCam()" style="display:none">🔄</button>
    </div>
  </div>

  <div class="upload-wrap">
    <button class="btn-up" onclick="document.getElementById('fileIn').click()">📁 Importa da Galleria</button>
    <input type="file" id="fileIn" accept="image/*" multiple onchange="onFiles(event)">
  </div>

  <div class="sec-hdr">
    <span class="lbl">Pagine (<span id="cntS">0</span>)</span>
    <button class="btn-clr" onclick="clearAll()">Svuota tutto</button>
  </div>
  <div class="grid" id="grid">
    <div class="empty"><div class="empty-ic">📄</div><p>Scatta o importa foto<br>per creare il documento</p></div>
  </div>

  <div class="exp-card">
    <span class="lbl">Modalità PDF</span>
    <div class="modes">
      <div class="mode on" onclick="setMode('color',this)"><div class="mode-ic">🎨</div><div class="mode-lb">Colore</div></div>
      <div class="mode" onclick="setMode('original',this)"><div class="mode-ic">📸</div><div class="mode-lb">Originale</div></div>
      <div class="mode" onclick="setMode('bw',this)"><div class="mode-ic">⬛</div><div class="mode-lb">B&amp;N</div></div>
    </div>
    <button class="btn-exp" id="btnExp" onclick="exportPDF()" disabled>📤 Esporta PDF</button>
    <div class="prog-wrap" id="progWrap"><div class="prog" id="prog"></div></div>
  </div>

</div>

<!-- MODAL — con handle, pulsante chiudi rosso, tap fuori chiude -->
<div class="modal" id="modal" onclick="onModalBg(event)">
  <div class="modal-box" id="modalBox">
    <div class="drag-handle"></div>
    <div class="modal-hdr">
      <span class="modal-title" id="mTitle">Pagina</span>
      <button class="btn-close" onclick="closeModal()">✕ Chiudi</button>
    </div>
    <div class="modal-img-wrap">
      <img id="mImg" src="" alt="">
    </div>
    <div class="modal-acts">
      <button class="btn-ma" onclick="closeModal()">← Indietro</button>
      <button class="btn-ma danger" onclick="delCurrent()">🗑 Elimina</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>
<canvas id="capCanvas"></canvas>

<script>
const {jsPDF} = window.jspdf;

let stream=null, facing='environment';
let pages=[];
let mode='color';
let selIdx=-1;
let edgeTimer=null;

// Buffer per stabilizzazione: teniamo gli ultimi N frame validi
const N_SMOOTH = 8;
let cbuf = [];  // array di {tl,tr,br,bl} in coordinate canvas

const video    = document.getElementById('video');
const overlayC = document.getElementById('overlay');
const capC     = document.getElementById('capCanvas');
const octx     = overlayC.getContext('2d');

// ── CAMERA ──────────────────────────────────────────────────────────────────
async function startCamera() {
  try {
    if (stream) stream.getTracks().forEach(t=>t.stop());

    // Chiedi esplicitamente portrait (height > width)
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: facing, width:{ideal:1080}, height:{ideal:1920} }
    });

    video.srcObject = stream;
    video.style.display = 'block';
    document.getElementById('ph').style.display = 'none';
    document.getElementById('liveDot').style.display = 'block';
    document.getElementById('flipBtn').style.display = 'flex';
    const btn = document.getElementById('mainBtn');
    btn.innerHTML = '📸 Scatta Foto';
    btn.onclick = capture;
    ['gTL','gTR','gBL','gBR'].forEach(id=>document.getElementById(id).style.display='block');

    video.onloadedmetadata = () => { syncOC(); cbuf=[]; startEdge(); };
    toast('Fotocamera attiva ✓','ok');
  } catch(e) { toast('Errore accesso fotocamera','err'); console.error(e); }
}

function syncOC() {
  overlayC.width  = video.videoWidth;
  overlayC.height = video.videoHeight;
}

async function flipCam() {
  facing = facing==='environment'?'user':'environment';
  await startCamera();
}

// ── EDGE DETECTION STABILE ──────────────────────────────────────────────────
function startEdge() {
  if (edgeTimer) clearInterval(edgeTimer);
  edgeTimer = setInterval(edgeFrame, 120);
}

function edgeFrame() {
  if (!video.videoWidth) return;
  syncOC();
  const W=overlayC.width, H=overlayC.height;

  // Downscale per velocità: lavora a 1/3 risoluzione
  const SC = 3;
  const sw=Math.floor(W/SC), sh=Math.floor(H/SC);
  const tmp=document.createElement('canvas');
  tmp.width=sw; tmp.height=sh;
  tmp.getContext('2d').drawImage(video, 0, 0, sw, sh);
  const id=tmp.getContext('2d').getImageData(0,0,sw,sh);

  const raw = findCorners(id, sw, sh);
  const corners = raw ? {
    tl:{x:raw.tl.x*SC, y:raw.tl.y*SC},
    tr:{x:raw.tr.x*SC, y:raw.tr.y*SC},
    br:{x:raw.br.x*SC, y:raw.br.y*SC},
    bl:{x:raw.bl.x*SC, y:raw.bl.y*SC},
  } : null;

  if (corners) {
    cbuf.push(corners);
    if (cbuf.length > N_SMOOTH) cbuf.shift();
  } else {
    if (cbuf.length > 1) cbuf.shift(); // fade lento
  }

  renderOverlay(W, H);
}

function smoothCorners() {
  if (!cbuf.length) return null;
  const avg={tl:{x:0,y:0},tr:{x:0,y:0},br:{x:0,y:0},bl:{x:0,y:0}};
  const keys=['tl','tr','br','bl'];
  for (const c of cbuf) for (const k of keys) { avg[k].x+=c[k].x; avg[k].y+=c[k].y; }
  const n=cbuf.length;
  for (const k of keys) { avg[k].x/=n; avg[k].y/=n; }
  return avg;
}

function renderOverlay(W, H) {
  octx.clearRect(0,0,W,H);
  const c = smoothCorners();
  if (c) {
    const {tl,tr,br,bl}=c;
    octx.beginPath();
    octx.moveTo(tl.x,tl.y); octx.lineTo(tr.x,tr.y);
    octx.lineTo(br.x,br.y); octx.lineTo(bl.x,bl.y);
    octx.closePath();
    octx.fillStyle='rgba(67,233,123,.06)'; octx.fill();
    octx.strokeStyle='rgba(67,233,123,.88)';
    octx.lineWidth=Math.max(2.5, W*.004);
    octx.setLineDash([]); octx.stroke();
    [tl,tr,br,bl].forEach(p=>{
      octx.beginPath();
      octx.arc(p.x,p.y,Math.max(7,W*.013),0,Math.PI*2);
      octx.fillStyle='rgba(67,233,123,.9)'; octx.fill();
    });
  } else {
    // Rettangolo guida
    const mx=W*.1,my=H*.06;
    octx.strokeStyle='rgba(255,255,255,.15)'; octx.lineWidth=1.5;
    octx.setLineDash([10,10]);
    octx.strokeRect(mx,my,W-mx*2,H-my*2);
    octx.setLineDash([]);
  }
}

// ── TROVA ANGOLI (Sobel + quadranti) ───────────────────────────────────────
function findCorners(imgData, W, H) {
  const d=imgData.data;
  const gray=new Float32Array(W*H);
  for (let i=0;i<W*H;i++) gray[i]=d[i*4]*.299+d[i*4+1]*.587+d[i*4+2]*.114;

  // Sobel
  const mag=new Float32Array(W*H);
  let maxM=0;
  for (let y=1;y<H-1;y++) for (let x=1;x<W-1;x++) {
    const gx=-gray[(y-1)*W+(x-1)]+gray[(y-1)*W+(x+1)]-2*gray[y*W+(x-1)]+2*gray[y*W+(x+1)]-gray[(y+1)*W+(x-1)]+gray[(y+1)*W+(x+1)];
    const gy=-gray[(y-1)*W+(x-1)]-2*gray[(y-1)*W+x]-gray[(y-1)*W+(x+1)]+gray[(y+1)*W+(x-1)]+2*gray[(y+1)*W+x]+gray[(y+1)*W+(x+1)];
    const m=Math.sqrt(gx*gx+gy*gy);
    mag[y*W+x]=m; if(m>maxM)maxM=m;
  }
  if (maxM<8) return null;
  const thr=maxM*.20;

  const mg=.08;
  const x0=Math.floor(W*mg),x1=Math.floor(W*(1-mg));
  const y0=Math.floor(H*mg),y1=Math.floor(H*(1-mg));

  // Cerca il punto edge più vicino a ciascun angolo
  const corners=[{cx:0,cy:0},{cx:W,cy:0},{cx:W,cy:H},{cx:0,cy:H}];
  const best=corners.map(()=>({x:0,y:0,score:-Infinity}));

  for (let y=y0;y<y1;y+=2) for (let x=x0;x<x1;x+=2) {
    if (mag[y*W+x]<thr) continue;
    for (let i=0;i<4;i++) {
      const dx=x-corners[i].cx, dy=y-corners[i].cy;
      const s=-(dx*dx+dy*dy);
      if (s>best[i].score) best[i]={x,y,score:s};
    }
  }

  if (best.some(b=>b.score===-Infinity)) return null;
  const [tl,tr,br,bl]=best;

  const docW=Math.max(tr.x-tl.x,br.x-bl.x);
  const docH=Math.max(bl.y-tl.y,br.y-tr.y);
  if (docW<W*.2||docH<H*.15) return null;
  const ratio=docW/docH;
  if (ratio<.25||ratio>4) return null;

  return {tl,tr,br,bl};
}

// ── SCATTO ──────────────────────────────────────────────────────────────────
async function capture() {
  if (!stream) return;
  const fl=document.getElementById('flash');
  fl.style.opacity=1; setTimeout(()=>fl.style.opacity=0,100);

  const VW=video.videoWidth, VH=video.videoHeight;
  capC.width=VW; capC.height=VH;
  capC.getContext('2d').drawImage(video,0,0,VW,VH);
  const origURL=capC.toDataURL('image/jpeg',.93);

  const sc=smoothCorners();
  let procURL;
  if (sc) {
    // Scala le coordinate dal canvas overlay (W x H) al video reale (VW x VH)
    const rx=VW/overlayC.width, ry=VH/overlayC.height;
    const scaled={
      tl:{x:sc.tl.x*rx,y:sc.tl.y*ry}, tr:{x:sc.tr.x*rx,y:sc.tr.y*ry},
      br:{x:sc.br.x*rx,y:sc.br.y*ry}, bl:{x:sc.bl.x*rx,y:sc.bl.y*ry},
    };
    procURL=perspCorrect(capC,scaled);
  } else {
    procURL=origURL;
  }

  pages.push({orig:origURL,proc:procURL});
  updateGrid(); updateExp();
  toast(`Pagina ${pages.length} acquisita ✓`,'ok');
}

// ── CORREZIONE PROSPETTICA ──────────────────────────────────────────────────
function perspCorrect(src, {tl,tr,br,bl}) {
  const W=Math.round(Math.max(Math.hypot(tr.x-tl.x,tr.y-tl.y),Math.hypot(br.x-bl.x,br.y-bl.y)));
  const H=Math.round(Math.max(Math.hypot(bl.x-tl.x,bl.y-tl.y),Math.hypot(br.x-tr.x,br.y-tr.y)));
  const dst=document.createElement('canvas'); dst.width=W; dst.height=H;
  const dctx=dst.getContext('2d');
  const s=src.getContext('2d').getImageData(0,0,src.width,src.height);
  const o=dctx.createImageData(W,H); const SW=src.width;
  for (let dy=0;dy<H;dy++) for (let dx=0;dx<W;dx++) {
    const u=dx/W, v=dy/H;
    const sx=Math.round((1-u)*(1-v)*tl.x+u*(1-v)*tr.x+u*v*br.x+(1-u)*v*bl.x);
    const sy=Math.round((1-u)*(1-v)*tl.y+u*(1-v)*tr.y+u*v*br.y+(1-u)*v*bl.y);
    if (sx>=0&&sx<src.width&&sy>=0&&sy<src.height) {
      const si=(sy*SW+sx)*4, di=(dy*W+dx)*4;
      o.data[di]=s.data[si]; o.data[di+1]=s.data[si+1];
      o.data[di+2]=s.data[si+2]; o.data[di+3]=255;
    }
  }
  dctx.putImageData(o,0,0);
  autoLvl(dst);
  return dst.toDataURL('image/jpeg',.93);
}

function autoLvl(c) {
  const cx=c.getContext('2d');
  const d=cx.getImageData(0,0,c.width,c.height); const px=d.data;
  let mn=[255,255,255],mx=[0,0,0];
  for (let i=0;i<px.length;i+=4) for (let ch=0;ch<3;ch++){mn[ch]=Math.min(mn[ch],px[i+ch]);mx[ch]=Math.max(mx[ch],px[i+ch]);}
  for (let i=0;i<px.length;i+=4) for (let ch=0;ch<3;ch++) px[i+ch]=Math.min(255,((px[i+ch]-mn[ch])/((mx[ch]-mn[ch])||1))*255);
  cx.putImageData(d,0,0);
}

// ── UPLOAD ──────────────────────────────────────────────────────────────────
function onFiles(e) {
  const files=Array.from(e.target.files); let done=0;
  files.forEach(f=>{
    const r=new FileReader();
    r.onload=ev=>{
      const u=ev.target.result;
      pages.push({orig:u,proc:u});
      if(++done===files.length){updateGrid();updateExp();toast(`${done} pagina/e aggiunta/e`,'ok');}
    };
    r.readAsDataURL(f);
  });
  e.target.value='';
}

// ── GRIGLIA ─────────────────────────────────────────────────────────────────
function updateGrid() {
  const g=document.getElementById('grid'), n=pages.length;
  document.getElementById('cnt').textContent=n;
  document.getElementById('cntS').textContent=n;
  if(!n){g.innerHTML='<div class="empty"><div class="empty-ic">📄</div><p>Scatta o importa foto<br>per creare il documento</p></div>';return;}
  g.innerHTML=pages.map((p,i)=>`
    <div class="thumb" onclick="openModal(${i})">
      <img src="${p.proc}" loading="lazy">
      <div class="thumb-ov">
        <span class="pnum">PAG.${i+1}</span>
        <button class="btn-del" onclick="event.stopPropagation();delPage(${i})">✕</button>
      </div>
    </div>`).join('');
}
function delPage(i){pages.splice(i,1);updateGrid();updateExp();toast('Pagina eliminata','ok');}
function clearAll(){if(!pages.length)return;if(confirm('Eliminare tutte le pagine?')){pages=[];updateGrid();updateExp();toast('Svuotato','ok');}}
function updateExp(){document.getElementById('btnExp').disabled=!pages.length;}

// ── MODAL ────────────────────────────────────────────────────────────────────
function openModal(i) {
  selIdx=i;
  document.getElementById('mImg').src=pages[i].proc;
  document.getElementById('mTitle').textContent=`Pagina ${i+1} di ${pages.length}`;
  document.getElementById('modal').classList.add('on');
  document.body.style.overflow='hidden';
}
function closeModal() {
  document.getElementById('modal').classList.remove('on');
  document.body.style.overflow='';
  selIdx=-1;
}
// Tap sullo sfondo chiude
function onModalBg(e){if(e.target===document.getElementById('modal'))closeModal();}
function delCurrent(){if(selIdx<0)return;delPage(selIdx);closeModal();}

// ── MODALITÀ ─────────────────────────────────────────────────────────────────
function setMode(m,el){
  mode=m;
  document.querySelectorAll('.mode').forEach(b=>b.classList.remove('on'));
  el.classList.add('on');
}

// ── PROCESSING ───────────────────────────────────────────────────────────────
function processImg(url,m){
  return new Promise(res=>{
    if(m==='original'){res(url);return;}
    const img=new Image();
    img.onload=()=>{
      const c=document.createElement('canvas'); c.width=img.width; c.height=img.height;
      const cx=c.getContext('2d'); cx.drawImage(img,0,0);
      const id=cx.getImageData(0,0,c.width,c.height); const px=id.data;
      if(m==='bw'){
        for(let i=0;i<px.length;i+=4){
          const l=Math.min(255,Math.max(0,(px[i]*.299+px[i+1]*.587+px[i+2]*.114-128)*1.5+128));
          px[i]=px[i+1]=px[i+2]=l;
        }
      } else {
        let mn=[255,255,255],mx=[0,0,0];
        for(let i=0;i<px.length;i+=4) for(let ch=0;ch<3;ch++){mn[ch]=Math.min(mn[ch],px[i+ch]);mx[ch]=Math.max(mx[ch],px[i+ch]);}
        for(let i=0;i<px.length;i+=4){
          let r=((px[i]-mn[0])/((mx[0]-mn[0])||1))*255;
          let g=((px[i+1]-mn[1])/((mx[1]-mn[1])||1))*255;
          let b=((px[i+2]-mn[2])/((mx[2]-mn[2])||1))*255;
          const lum=r*.299+g*.587+b*.114;
          px[i]=Math.min(255,Math.max(0,lum+(r-lum)*1.3));
          px[i+1]=Math.min(255,Math.max(0,lum+(g-lum)*1.3));
          px[i+2]=Math.min(255,Math.max(0,lum+(b-lum)*1.3));
        }
      }
      cx.putImageData(id,0,0);
      res(c.toDataURL('image/jpeg',.93));
    };
    img.src=url;
  });
}

// ── EXPORT PDF ───────────────────────────────────────────────────────────────
async function exportPDF(){
  if(!pages.length)return;
  const btn=document.getElementById('btnExp'),pw=document.getElementById('progWrap'),pf=document.getElementById('prog');
  btn.disabled=true; btn.innerHTML='⏳ Generazione...'; pw.style.display='block'; pf.style.width='0%';
  try{
    const pdf=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
    const PW=210,PH=297;
    for(let i=0;i<pages.length;i++){
      pf.style.width=((i+.5)/pages.length*100)+'%';
      if(i>0)pdf.addPage();
      const imgD=await processImg(pages[i].proc,mode);
      const dim=await new Promise(r=>{const im=new Image();im.onload=()=>r({w:im.width,h:im.height});im.src=imgD;});
      const ratio=dim.w/dim.h, mh=10,mv=12,maxW=PW-mh*2,maxH=PH-mv*2;
      let dw,dh;
      if(ratio>maxW/maxH){dw=maxW;dh=maxW/ratio;}else{dh=maxH;dw=maxH*ratio;}
      pdf.addImage(imgD,'JPEG',(PW-dw)/2,(PH-dh)/2,dw,dh);
      pdf.setFontSize(8);pdf.setTextColor(160,160,160);
      pdf.text(`${i+1} / ${pages.length}`,PW/2,PH-4,{align:'center'});
      pf.style.width=((i+1)/pages.length*100)+'%';
    }
    const lb={color:'colore',original:'originale',bw:'bianconero'};
    pdf.save(`documento_${lb[mode]}_${Date.now()}.pdf`);
    toast('PDF esportato ✓','ok');
  }catch(e){console.error(e);toast('Errore esportazione','err');}
  btn.disabled=false; btn.innerHTML='📤 Esporta PDF';
  setTimeout(()=>{pw.style.display='none';pf.style.width='0%';},1200);
}

// ── UTILS ────────────────────────────────────────────────────────────────────
let toastT=null;
function toast(msg,type=''){
  const t=document.getElementById('toast');
  t.textContent=msg; t.className=`toast show ${type}`;
  if(toastT)clearTimeout(toastT);
  toastT=setTimeout(()=>t.classList.remove('show'),2600);
}
window.addEventListener('resize',()=>{if(video.videoWidth)syncOC();});
document.addEventListener('visibilitychange',()=>{
  if(document.hidden){if(edgeTimer)clearInterval(edgeTimer);}
  else if(stream){syncOC();startEdge();}
});
